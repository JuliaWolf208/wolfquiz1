<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>260320_Klasse9_Musik-Mix</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #fce4ec 0%, #ede7f6 50%, #e8eaf6 100%); color: #4a3a6a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; text-align: center; color: #7c6fcd; }
.subtitle { color: #b0a8d8; font-size: 0.9rem; margin-bottom: 20px; text-align: center; font-weight: 600; }

/* Start screen */
.start-screen { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
.start-emoji { font-size: 4rem; }
.start-title { font-size: 2rem; font-weight: 700; color: #7c6fcd; }
.start-info { background: rgba(255,255,255,0.85); border-radius: 16px; padding: 24px 28px; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(124,111,205,0.1); display: flex; flex-direction: column; gap: 14px; border: 1px solid rgba(255,255,255,0.9); }
.start-info p { font-size: 0.95rem; color: #5a4a8a; font-weight: 600; }
.timer-input-row { display: flex; align-items: center; gap: 10px; }
.timer-input-row label { font-size: 0.95rem; color: #5a4a8a; font-weight: 600; white-space: nowrap; }
.timer-input { width: 70px; padding: 8px 12px; border-radius: 8px; border: 2px solid #d8d0f0; font-family: ‘Quicksand’, sans-serif; font-size: 1rem; font-weight: 700; color: #7c6fcd; text-align: center; outline: none; background: white; }
.timer-input:focus { border-color: #9c6fcd; }
.timer-unit { font-size: 0.95rem; color: #b0a8d8; font-weight: 600; }
.play-btn { padding: 18px 48px; border-radius: 14px; border: none; background: linear-gradient(135deg, #f48fb1, #9c6fcd); color: white; font-family: ‘Quicksand’, sans-serif; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; box-shadow: 0 4px 16px rgba(156,111,205,0.3); }
.play-btn:hover { opacity: 0.88; }

/* Big question number */
.question-number-display { font-size: 4rem; font-weight: 700; color: #9c6fcd; text-align: center; line-height: 1; margin-bottom: 4px; }
.question-number-label { font-size: 0.85rem; color: #b0a8d8; text-align: center; font-weight: 600; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }

.card { background: rgba(255,255,255,0.78); backdrop-filter: blur(10px); border-radius: 20px; padding: 28px 32px; max-width: 580px; width: 100%; box-shadow: 0 8px 32px rgba(124,111,205,0.1); border: 1px solid rgba(255,255,255,0.9); }
.timer-wrap { background: #e8e4f5; border-radius: 99px; height: 10px; margin-bottom: 8px; overflow: hidden; }
.timer-fill { height: 100%; background: #9c6fcd; border-radius: 99px; transition: width 1s linear, background 1s linear; width: 100%; }
.timer-fill.warning { background: #ff9800; }
.timer-fill.danger { background: #e53935; }
.timer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.timer-seconds { font-size: 1rem; font-weight: 700; color: #9c6fcd; }
.timer-seconds.warning { color: #ff9800; }
.timer-seconds.danger { color: #e53935; }
.pause-btn { padding: 5px 14px; border-radius: 8px; border: 1.5px solid #d8d0f0; background: white; color: #7c6fcd; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: ‘Quicksand’, sans-serif; transition: background 0.15s; }
.pause-btn:hover { background: #f3f0fc; }
.pause-btn:disabled { opacity: 0.3; cursor: default; }
.score-display { font-size: 0.82rem; color: #b0a8d8; font-weight: 700; }
.question-text { font-size: 1.15rem; font-weight: 600; line-height: 1.6; margin-bottom: 24px; color: #4a3a6a; }
.btn-group { display: flex; flex-direction: column; gap: 10px; }
.answer-btn { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1.5px solid #d8d0f0; background: rgba(255,255,255,0.8); font-family: ‘Quicksand’, sans-serif; font-size: 1rem; font-weight: 700; color: #5a4a8a; cursor: pointer; text-align: left; transition: background 0.15s, border-color 0.15s; }
.answer-btn:hover:not(:disabled) { background: rgba(237,231,246,0.9); border-color: #9c6fcd; }
.answer-btn.correct { background: #e8f5e9 !important; border-color: #81c784 !important; color: #2e7d32 !important; }
.answer-btn.wrong { background: #fce4ec !important; border-color: #f48fb1 !important; color: #c62828 !important; text-decoration: line-through; }
.answer-btn:disabled { cursor: default; }
.feedback { margin-top: 16px; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; display: none; line-height: 1.5; }
.feedback.show { display: block; }
.feedback.correct-fb { background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; }
.feedback.wrong-fb { background: #fce4ec; color: #c62828; border: 1.5px solid #f48fb1; }
.feedback.timeout-fb { background: #fff8e1; color: #e65100; border: 1.5px solid #ffcc80; }
.btn-row { display: flex; gap: 10px; margin-top: 18px; }
.back-btn { padding: 14px 18px; border-radius: 12px; border: 1.5px solid #d8d0f0; background: white; color: #7c6fcd; font-family: ‘Quicksand’, sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
.back-btn:hover { background: #f3f0fc; }
.back-btn:disabled { opacity: 0.3; cursor: default; }
.next-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, #f48fb1, #9c6fcd); color: white; font-family: ‘Quicksand’, sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
.next-btn:hover { opacity: 0.88; }
.result-screen { display: none; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
.result-screen.show { display: flex; }
.result-emoji { font-size: 3.5rem; }
.result-title { font-size: 1.6rem; font-weight: 700; color: #7c6fcd; }
.result-score { color: #b0a8d8; font-size: 1rem; }
.restart-btn { margin-top: 8px; padding: 12px 32px; border-radius: 12px; border: 1.5px solid #d8d0f0; background: white; font-family: ‘Quicksand’, sans-serif; font-size: 1rem; font-weight: 700; color: #7c6fcd; cursor: pointer; }
.restart-btn:hover { background: #f3f0fc; }
</style>

</head>
<body>
<h1>Dur- und Moll-Dreiklänge</h1>
<p class="subtitle">Akkorde</p>

<!-- Start screen -->

<div id="startScreen" class="start-screen">
  <div class="start-emoji">🎵</div>
  <div class="start-title">Los geht's!</div>
  <div class="start-info">
    <p>🎼 Alles über den Aufbau von Akkorden</p>
    <div class="timer-input-row">
      <label for="timerInput">⏱ Sekunden pro Frage:</label>
      <input class="timer-input" id="timerInput" type="number" min="5" max="60" value="15">
      <span class="timer-unit">Sek</span>
    </div>
  </div>
  <button class="play-btn" onclick="startQuiz()">&#9654; Los geht's!</button>
</div>

<!-- Quiz -->

<div id="quizWrap" style="display:none; width:100%; max-width:580px;">
  <div class="question-number-display" id="bigNumber">1</div>
  <div class="question-number-label" id="bigLabel">von 16</div>
  <div class="card">
    <div class="timer-wrap"><div class="timer-fill" id="timerFill"></div></div>
    <div class="timer-row">
      <span class="timer-seconds" id="timerSeconds">15s</span>
      <button class="pause-btn" id="pauseBtn" onclick="togglePause()">&#9646;&#9646; Pause</button>
      <span class="score-display">Punkte: <strong id="scoreNum">0</strong></span>
    </div>
    <div id="questionArea">
      <div class="question-text" id="questionText"></div>
      <div class="btn-group" id="btnGroup"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="back-btn" id="backBtn" onclick="prevQuestion()">&#8592; Zurück</button>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Nächste Frage &#8594;</button>
      </div>
    </div>
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <button class="restart-btn" onclick="restart()">&#8629; Nochmal</button>
    </div>
  </div>
</div>

<script>
var TIMER_SECONDS = 15;
var questions = [
  { text: "Aus wie vielen verschiedenen Tönen besteht ein Dreiklang mindestens?", options: ["2 Töne", "3 Töne", "4 Töne", "5 Töne", "6 Töne"], answer: 1, explanation: "Wie der Name schon sagt, besteht ein Dreiklang aus mindestens drei verschiedenen Tönen." },
  { text: "Welche Stufen einer Tonleiter werden verwendet, um einen Grundstellungs-Dreiklang zu bilden?", options: ["1., 2. und 3. Stufe", "1., 4. und 5. Stufe", "2., 4. und 6. Stufe", "1., 3. und 5. Stufe", "1., 3. und 7. Stufe"], answer: 3, explanation: "Man nimmt den 1. (Grundton), den 3. (Terz) und den 5. Ton (Quinte) der jeweiligen Tonleiter." },
  { text: "Wie werden die Noten eines Akkords im Notensystem angeordnet, wenn sie gleichzeitig klingen sollen?", options: ["Nebeneinander", "Hintereinander", "Vertikal untereinander", "In verschiedenen Takten", "Diagonal"], answer: 2, explanation: "Töne, die gleichzeitig klingen, werden im Notensystem vertikal übereinander (wie ein 'Schneemann') notiert." },
  { text: "Welches Intervall liegt bei einem DUR-Dreiklang zwischen dem Grundton und dem mittleren Ton?", options: ["Kleine Terz", "Große Terz", "Reine Quarte", "Reine Quinte", "Große Sekunde"], answer: 1, explanation: "Ein Dur-Dreiklang beginnt mit einer großen Terz (4 Halbtonschritte) unten." },
  { text: "Was muss man tun, um aus einem Dur-Dreiklang einen Moll-Dreiklang zu machen?", options: ["Den untersten Ton erhöhen", "Den obersten Ton erhöhen", "Den mittleren Ton um einen Halbton erniedrigen", "Den mittleren Ton um einen Halbton erhöhen", "Alle Töne verdoppeln"], answer: 2, explanation: "Die Terz macht den Unterschied: Erniedrigt man den mittleren Ton, wird aus Dur Moll." },
  { text: "Welches Intervall liegt bei einem MOLL-Dreiklang zwischen dem Grundton und dem mittleren Ton?", options: ["Große Terz", "Kleine Terz", "Reine Quinte", "Kleine Sekunde", "Große Sekunde"], answer: 1, explanation: "Ein Moll-Dreiklang hat unten eine kleine Terz (3 Halbtonschritte)." },
  { text: "Welches Intervall bleibt sowohl bei Dur- als auch bei Moll-Dreiklängen zwischen Grundton und dem obersten Ton gleich?", options: ["Große Terz", "Kleine Terz", "Reine Quarte", "Reine Quinte", "Oktave"], answer: 3, explanation: "Der Rahmen (1. bis 5. Ton) ist bei beiden Akkordgeschlechtern eine reine Quinte." },
  { text: "Aus welchen Tönen besteht der C-Dur Dreiklang?", options: ["C - D - E", "C - E - G", "C - Es - G", "C - F - A", "C - E - Gis"], answer: 1, explanation: "C-Dur nutzt die Stammtöne C (1.), E (3.) und G (5.) ohne Vorzeichen." }

];

var current = 0, score = 0, answered = false, paused = false;
var timerInterval = null, timeLeft = TIMER_SECONDS;
var answeredState = [];

function startQuiz() {
  var val = parseInt(document.getElementById('timerInput').value);
  if (isNaN(val) || val < 5) val = 5;
  if (val > 60) val = 60;
  TIMER_SECONDS = val;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  var q = questions[current];
  document.getElementById('bigNumber').textContent = current + 1;
  document.getElementById('bigLabel').textContent = 'von ' + questions.length;
  document.getElementById('questionText').textContent = q.text;
  var html = '';
  for (var i = 0; i < q.options.length; i++) {
    html += '<button class="answer-btn" id="btn' + i + '" onclick="answer(' + i + ')">' + (i+1) + ' \u2013 ' + q.options[i] + '</button>';
  }
  document.getElementById('btnGroup').innerHTML = html;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').textContent = current + 1 < questions.length ? 'N\u00e4chste Frage \u2192' : 'Ergebnis anzeigen \u2192';
  document.getElementById('backBtn').disabled = current === 0;
  document.getElementById('pauseBtn').textContent = '\u2759\u2759 Pause';
  paused = false;

  if (answeredState[current] !== undefined) {
    answered = true;
    clearInterval(timerInterval);
    var state = answeredState[current];
    for (var i = 0; i < q.options.length; i++) { document.getElementById('btn' + i).disabled = true; }
    if (state.chosen !== null) {
      document.getElementById('btn' + state.chosen).classList.add(state.correct ? 'correct' : 'wrong');
      if (!state.correct) document.getElementById('btn' + q.answer).classList.add('correct');
      var fb = document.getElementById('feedback');
      fb.textContent = (state.correct ? '\u2705 Richtig! ' : '\u274C Leider falsch! ') + q.explanation;
      fb.className = 'feedback show ' + (state.correct ? 'correct-fb' : 'wrong-fb');
    } else {
      var fb = document.getElementById('feedback');
      fb.textContent = '\u23F0 Zeit abgelaufen! N\u00e4chste Frage bitte.';
      fb.className = 'feedback show timeout-fb';
    }
    document.getElementById('timerFill').style.width = '0%';
    document.getElementById('timerSeconds').textContent = '\u2013';
    document.getElementById('pauseBtn').disabled = true;
  } else {
    answered = false;
    document.getElementById('pauseBtn').disabled = false;
    startTimer();
  }
}

function prevQuestion() {
  clearInterval(timerInterval);
  if (current > 0) { current--; renderQuestion(); }
}

function togglePause() {
  if (answered) return;
  paused = !paused;
  var btn = document.getElementById('pauseBtn');
  if (paused) {
    clearInterval(timerInterval);
    btn.textContent = '\u25BA Weiter';
  } else {
    btn.textContent = '\u2759\u2759 Pause';
    timerInterval = setInterval(tick, 1000);
  }
}

function startTimer() {
  clearInterval(timerInterval);
  paused = false;
  timeLeft = TIMER_SECONDS;
  updateTimerDisplay();
  timerInterval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  updateTimerDisplay();
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    if (!answered) {
      answered = true;
      answeredState[current] = { chosen: null, correct: false };
      for (var i = 0; i < questions[current].options.length; i++) {
        document.getElementById('btn' + i).disabled = true;
      }
      var fb = document.getElementById('feedback');
      fb.textContent = '\u23F0 Zeit abgelaufen! N\u00e4chste Frage bitte.';
      fb.className = 'feedback show timeout-fb';
      document.getElementById('pauseBtn').disabled = true;
    }
    setTimeout(function() { nextQuestion(); }, 2000);
  }
}

function updateTimerDisplay() {
  var pct = (timeLeft / TIMER_SECONDS) * 100;
  var fill = document.getElementById('timerFill');
  var secs = document.getElementById('timerSeconds');
  var warn = Math.round(TIMER_SECONDS * 0.4);
  var danger = Math.round(TIMER_SECONDS * 0.2);
  fill.style.width = pct + '%';
  fill.className = 'timer-fill' + (timeLeft <= danger ? ' danger' : timeLeft <= warn ? ' warning' : '');
  secs.className = 'timer-seconds' + (timeLeft <= danger ? ' danger' : timeLeft <= warn ? ' warning' : '');
  secs.textContent = timeLeft + 's';
}

function answer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  document.getElementById('pauseBtn').disabled = true;
  var q = questions[current];
  var correct = idx === q.answer;
  answeredState[current] = { chosen: idx, correct: correct };
  for (var i = 0; i < q.options.length; i++) { document.getElementById('btn' + i).disabled = true; }
  document.getElementById('btn' + idx).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById('btn' + q.answer).classList.add('correct');
  if (correct) { score++; document.getElementById('scoreNum').textContent = score; }
  var fb = document.getElementById('feedback');
  fb.textContent = (correct ? '\u2705 Richtig! ' : '\u274C Leider falsch! ') + q.explanation;
  fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  setTimeout(function() { nextQuestion(); }, 3000);
}

function nextQuestion() {
  clearInterval(timerInterval);
  current++;
  if (current >= questions.length) showResult(); else renderQuestion();
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('timerFill').style.width = '0%';
  document.getElementById('timerSeconds').textContent = '';
  document.getElementById('bigNumber').textContent = '\uD83C\uDFC6';
  document.getElementById('bigLabel').textContent = '';
  document.getElementById('questionArea').style.display = 'none';
  document.getElementById('resultScreen').classList.add('show');
  var pct = score / questions.length;
  document.getElementById('resultEmoji').textContent = pct===1?'\uD83C\uDFC6':pct>=0.75?'\uD83C\uDF89':pct>=0.5?'\uD83D\uDC4D':'\uD83D\uDCAA';
  document.getElementById('resultTitle').textContent = pct===1?'Perfekt!':pct>=0.75?'Super!':pct>=0.5?'Gut gemacht!':'Weiter \u00fcben!';
  document.getElementById('resultScore').textContent = score + ' von ' + questions.length + ' Fragen richtig.' + (pct < 0.75 ? ' Noch etwas \u00fcben!' : '');
}

function restart() {
  current = 0; score = 0; answeredState = [];
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}
</script>

</body>
</html>
