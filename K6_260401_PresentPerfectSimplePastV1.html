<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Quicksand', sans-serif; background: #000000; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; text-align: center; color: #ffffff; }
.subtitle { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 20px; text-align: center; font-weight: 600; }
.start-screen { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
.start-emoji { font-size: 4rem; }
.start-title { font-size: 2rem; font-weight: 700; color: #ffffff; }
.start-info { background: #111111; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px 28px; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 14px; }
.start-info p { font-size: 0.95rem; color: rgba(255,255,255,0.7); font-weight: 600; }
.timer-input-row { display: flex; align-items: center; gap: 10px; }
.timer-input-row label { font-size: 0.95rem; color: rgba(255,255,255,0.7); font-weight: 600; white-space: nowrap; }
.timer-input { width: 70px; padding: 8px 12px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; color: white; text-align: center; outline: none; background: rgba(255,255,255,0.08); }
.timer-input:focus { border-color: #f5a623; }
.timer-unit { font-size: 0.95rem; color: rgba(255,255,255,0.4); font-weight: 600; }
.play-btn { padding: 18px 48px; border-radius: 14px; border: none; background: linear-gradient(135deg,#f7971e,#ff416c); color: white; font-family: 'Quicksand', sans-serif; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; box-shadow: 0 4px 16px rgba(255,65,108,0.3); text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
.play-btn:hover { opacity: 0.88; }
.portal-link-start { display: inline-block; margin-top: 4px; text-decoration: none; color: #f5a623; font-weight: 700; font-size: 0.95rem; padding: 10px 24px; border: 2px solid #f5a623; border-radius: 12px; transition: background 0.15s; }
.portal-link-start:hover { background: rgba(245,166,35,0.1); }
.question-number-display { font-size: 4rem; font-weight: 700; color: #f5a623; text-align: center; line-height: 1; margin-bottom: 4px; }
.question-number-label { font-size: 0.85rem; color: rgba(255,255,255,0.4); text-align: center; font-weight: 600; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
.card { background: #111111; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 28px 32px; max-width: 580px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.timer-wrap { background: rgba(255,255,255,0.1); border-radius: 99px; height: 10px; margin-bottom: 8px; overflow: hidden; }
.timer-fill { height: 100%; background: #f5a623; border-radius: 99px; transition: width 1s linear, background 1s linear; width: 100%; }
.timer-fill.warning { background: #ff9800; }
.timer-fill.danger { background: #e53935; }
.timer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.timer-seconds { font-size: 1rem; font-weight: 700; color: #f5a623; }
.timer-seconds.warning { color: #ff9800; }
.timer-seconds.danger { color: #e53935; }
.pause-btn { padding: 5px 14px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Quicksand', sans-serif; transition: background 0.15s; }
.pause-btn:hover { background: rgba(255,255,255,0.1); }
.pause-btn:disabled { opacity: 0.3; cursor: default; }
.score-display { font-size: 0.82rem; color: rgba(255,255,255,0.4); font-weight: 700; }
.question-text { font-size: 1.15rem; font-weight: 600; line-height: 1.6; margin-bottom: 24px; color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }
.btn-group { display: flex; flex-direction: column; gap: 12px; }
.answer-btn { width: 100%; padding: 12px 16px; border-radius: 12px; border: none; font-family: 'Quicksand', sans-serif; font-size: 1.05rem; font-weight: 600; color: white; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 15px; transition: all 0.2s; text-shadow: 0 1px 4px rgba(0,0,0,0.7); }
.answer-btn:nth-child(1) { background: linear-gradient(135deg,#ff0000,#ff8c00); }
.answer-btn:nth-child(2) { background: linear-gradient(135deg,#ff8c00,#43e97b); }
.answer-btn:nth-child(3) { background: linear-gradient(135deg,#43e97b,#0052ff); }
.answer-btn:nth-child(4) { background: linear-gradient(135deg,#0052ff,#c471ed); }
.answer-btn:nth-child(5) { background: linear-gradient(135deg,#c471ed,#ff0000); }
.answer-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
.finger-num { background: rgba(255,255,255,0.25); color: white; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 800; border: 2px solid rgba(255,255,255,0.4); flex-shrink: 0; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
.answer-btn.correct { background: linear-gradient(135deg,#56ffa4,#00b340) !important; box-shadow: 0 0 20px rgba(0,255,100,0.4) !important; }
.answer-btn.wrong { opacity: 0.25 !important; }
.feedback { margin-top: 16px; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; display: none; line-height: 1.5; }
.feedback.show { display: block; }
.feedback.correct-fb { background: rgba(0,200,83,0.15); color: #69f0ae; border: 1.5px solid rgba(0,200,83,0.4); }
.feedback.wrong-fb { background: rgba(255,65,108,0.15); color: #ff8fa3; border: 1.5px solid rgba(255,65,108,0.4); }
.feedback.timeout-fb { background: rgba(255,152,0,0.15); color: #ffcc80; border: 1.5px solid rgba(255,152,0,0.4); }
.btn-row { display: flex; gap: 10px; margin-top: 18px; }
.back-btn { padding: 14px 18px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
.back-btn:hover { background: rgba(255,255,255,0.1); }
.next-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg,#f7971e,#ff416c); color: white; font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
.next-btn:hover { opacity: 0.88; }
.result-screen { display: none; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
.result-screen.show { display: flex; }
.result-emoji { font-size: 3.5rem; }
.result-title { font-size: 1.6rem; font-weight: 700; color: white; }
.result-score { color: rgba(255,255,255,0.4); font-size: 1rem; }
.restart-btn { margin-top: 8px; padding: 12px 32px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; color: white; cursor: pointer; }
.restart-btn:hover { background: rgba(255,255,255,0.1); }
.portal-link { text-decoration: none; color: #f5a623; font-weight: 700; font-size: 0.95rem; padding: 10px 24px; border: 2px solid #f5a623; border-radius: 12px; transition: background 0.15s; }
.portal-link:hover { background: rgba(245,166,35,0.1); }
</style>
</head>
<body>

<h1>Simple Past vs. Present Perfect</h1>
<p class="subtitle">Class 6 &middot; 8 Questions</p>

<div id="startScreen" class="start-screen">
  <div class="start-emoji">⏳</div>
  <div class="start-title">Get ready!</div>
  <div class="start-info">
    <p>📝 8 questions</p>
    <div class="timer-input-row">
      <label for="timerInput">⏱ Seconds per question:</label>
      <input class="timer-input" id="timerInput" type="number" min="5" max="60" value="15">
      <span class="timer-unit">sec</span>
    </div>
  </div>
  <button class="play-btn" onclick="startQuiz()">▶ Let's go!</button>
  <a href="index.html" class="portal-link-start">← Back to Portal</a>
</div>

<div id="quizWrap" style="display:none; width:100%; max-width:580px;">
  <div class="question-number-display" id="bigNumber">1</div>
  <div class="question-number-label" id="bigLabel">of 8</div>
  <div class="card">
    <div class="timer-wrap"><div class="timer-fill" id="timerFill"></div></div>
    <div class="timer-row">
      <span class="timer-seconds" id="timerSeconds">15s</span>
      <button class="pause-btn" id="pauseBtn" onclick="togglePause()">Pause</button>
      <span class="score-display">Score: <strong id="scoreNum">0</strong></span>
    </div>
    <div id="questionArea">
      <div class="question-text" id="questionText"></div>
      <div class="btn-group" id="btnGroup"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="back-btn" id="backBtn" onclick="goBack()">← Back</button>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next question →</button>
      </div>
    </div>
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <button class="restart-btn" onclick="restart()">↩ Play again</button>
      <a href="index.html" class="portal-link">← Back to Portal</a>
    </div>
  </div>
</div>

<script>
var TIMER_SECONDS = 15;
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep() {
  try {
    var ctx = getAudioCtx(); var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

// Positionsplan: 2, 4, 0, 3, 1, 4, 2, 0
var questions = [
  {
    text: 'Choose the correct sentence.',
    options: [
      'She already has eaten breakfast.',
      'She eat breakfast an hour ago.',
      'She ate breakfast an hour ago.',
      'She has ate breakfast an hour ago.',
      'She eated breakfast an hour ago.'
    ],
    answer: 2,
    explanation: 'Simple Past (ate) is used because "an hour ago" is a finished time in the past.'
  },
  {
    text: 'Which sentence is correct?',
    options: [
      'I never seen snow before.',
      'I didn\'t saw snow before.',
      'I have seen snow yesterday.',
      'I have never see snow before.',
      'I have never seen snow before.'
    ],
    answer: 4,
    explanation: 'Present Perfect (have never seen) is used for an experience up to now – no specific time given.'
  },
  {
    text: 'Tom _____ his homework yet. Choose the correct form.',
    options: [
      'hasn\'t finished',
      'didn\'t finished',
      'hasn\'t finish',
      'not finished',
      'didn\'t finish yet'
    ],
    answer: 0,
    explanation: '"Yet" signals Present Perfect in negative sentences: hasn\'t finished.'
  },
  {
    text: 'Which sentence uses the Simple Past correctly?',
    options: [
      'We have visited Paris last summer.',
      'We visited Paris last summer.',
      'We have visit Paris last summer.',
      'We did visit to Paris last summer.',
      'We have been visit Paris last summer.'
    ],
    answer: 1,
    explanation: '"Last summer" is a specific finished time, so Simple Past (visited) is correct.'
  },
  {
    text: '_____ you ever tried sushi? Choose the correct form.',
    options: [
      'Did you ever tried',
      'Have you ever tried',
      'Did you ever try',
      'Have you tried ever',
      'Did you ever have tried'
    ],
    answer: 1,
    explanation: '"Ever" in questions about life experiences uses Present Perfect: Have you ever tried.'
  },
  {
    text: 'My parents _____ to New York in 2019. Choose the correct form.',
    options: [
      'have gone',
      'has went',
      'went',
      'have went',
      'gone'
    ],
    answer: 2,
    explanation: '"In 2019" is a specific finished time, so Simple Past (went) is correct.'
  },
  {
    text: 'Choose the correct sentence about a recent event.',
    options: [
      'I just dropped my phone.',
      'I have just dropped my phone.',
      'I just have dropped my phone.',
      'I did just drop my phone.',
      'I have just drop my phone.'
    ],
    answer: 1,
    explanation: '"Just" with a recent result uses Present Perfect: I have just dropped my phone.'
  },
  {
    text: 'She _____ three cups of coffee this morning (it\'s still morning). Choose the correct form.',
    options: [
      'has drunk',
      'drank',
      'have drunk',
      'has drank',
      'did drink'
    ],
    answer: 0,
    explanation: 'The time period (this morning) is not finished yet, so Present Perfect (has drunk) is correct.'
  }
];

var current = 0, score = 0, answered = false, paused = false;
var timerInterval = null, timeLeft = TIMER_SECONDS;
var answeredState = [];

function startQuiz() {
  var val = parseInt(document.getElementById('timerInput').value);
  if (isNaN(val) || val < 5) val = 5;
  if (val > 60) val = 60;
  TIMER_SECONDS = val;
  try { getAudioCtx(); } catch(e) {}
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  var q = questions[current];
  document.getElementById('bigNumber').textContent = current + 1;
  document.getElementById('bigLabel').textContent = 'of ' + questions.length;
  document.getElementById('questionText').textContent = q.text;
  var html = '';
  for (var i = 0; i < q.options.length; i++) {
    html += '<button class="answer-btn" id="btn' + i + '" onclick="answer(' + i + ')"><span class="finger-num">' + (i+1) + '</span>' + q.options[i] + '</button>';
  }
  document.getElementById('btnGroup').innerHTML = html;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').textContent = current + 1 < questions.length ? 'Next question \u2192' : 'See results \u2192';
  document.getElementById('backBtn').textContent = current === 0 ? '\u2190 Start' : '\u2190 Back';
  document.getElementById('pauseBtn').textContent = 'Pause';
  paused = false;

  if (answeredState[current] !== undefined) {
    answered = true; clearInterval(timerInterval);
    var state = answeredState[current];
    for (var i = 0; i < q.options.length; i++) { document.getElementById('btn' + i).disabled = true; }
    if (state.chosen !== null) {
      document.getElementById('btn' + state.chosen).classList.add(state.correct ? 'correct' : 'wrong');
      if (!state.correct) document.getElementById('btn' + q.answer).classList.add('correct');
      var fb = document.getElementById('feedback');
      fb.textContent = (state.correct ? '\u2705 Correct! ' : '\u274C Not quite! ') + q.explanation;
      fb.className = 'feedback show ' + (state.correct ? 'correct-fb' : 'wrong-fb');
    } else {
      document.getElementById('feedback').textContent = "\u23F0 Time's up! Next question please.";
      document.getElementById('feedback').className = 'feedback show timeout-fb';
    }
    document.getElementById('timerFill').style.width = '0%';
    document.getElementById('timerSeconds').textContent = '\u2013';
    document.getElementById('pauseBtn').disabled = true;
  } else {
    answered = false;
    document.getElementById('pauseBtn').disabled = false;
    startTimer();
  }
}

function goBack() {
  clearInterval(timerInterval);
  if (current === 0) {
    document.getElementById('quizWrap').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    current = 0; score = 0; answeredState = [];
    document.getElementById('scoreNum').textContent = 0;
    document.getElementById('questionArea').style.display = 'block';
    document.getElementById('resultScreen').classList.remove('show');
  } else {
    current--; renderQuestion();
  }
}

function togglePause() {
  if (answered) return; paused = !paused;
  if (paused) { clearInterval(timerInterval); document.getElementById('pauseBtn').textContent = '\u25BA Resume'; }
  else { document.getElementById('pauseBtn').textContent = 'Pause'; timerInterval = setInterval(tick, 1000); }
}

function startTimer() {
  clearInterval(timerInterval); paused = false; timeLeft = TIMER_SECONDS;
  updateTimerDisplay(); timerInterval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--; updateTimerDisplay();
  if (timeLeft <= 3 && timeLeft > 0) { beep(); }
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    if (!answered) {
      answered = true; answeredState[current] = { chosen: null, correct: false };
      for (var i = 0; i < questions[current].options.length; i++) { document.getElementById('btn' + i).disabled = true; }
      document.getElementById('feedback').textContent = "\u23F0 Time's up! Next question please.";
      document.getElementById('feedback').className = 'feedback show timeout-fb';
      document.getElementById('pauseBtn').disabled = true;
    }
    setTimeout(function() { nextQuestion(); }, 2000);
  }
}

function updateTimerDisplay() {
  var pct = (timeLeft / TIMER_SECONDS) * 100;
  var fill = document.getElementById('timerFill'); var secs = document.getElementById('timerSeconds');
  var warn = Math.round(TIMER_SECONDS * 0.4); var danger = Math.round(TIMER_SECONDS * 0.2);
  fill.style.width = pct + '%';
  fill.className = 'timer-fill' + (timeLeft <= danger ? ' danger' : timeLeft <= warn ? ' warning' : '');
  secs.className = 'timer-seconds' + (timeLeft <= danger ? ' danger' : timeLeft <= warn ? ' warning' : '');
  secs.textContent = timeLeft + 's';
}

function answer(idx) {
  if (answered) return; answered = true; clearInterval(timerInterval);
  document.getElementById('pauseBtn').disabled = true;
  var q = questions[current]; var correct = idx === q.answer;
  answeredState[current] = { chosen: idx, correct: correct };
  for (var i = 0; i < q.options.length; i++) { document.getElementById('btn' + i).disabled = true; }
  document.getElementById('btn' + idx).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById('btn' + q.answer).classList.add('correct');
  if (correct) { score++; document.getElementById('scoreNum').textContent = score; }
  var fb = document.getElementById('feedback');
  fb.textContent = (correct ? '\u2705 Correct! ' : '\u274C Not quite! ') + q.explanation;
  fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
}

function nextQuestion() {
  clearInterval(timerInterval); current++;
  if (current >= questions.length) showResult(); else renderQuestion();
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('timerFill').style.width = '0%'; document.getElementById('timerSeconds').textContent = '';
  document.getElementById('bigNumber').textContent = '\uD83C\uDFC6'; document.getElementById('bigLabel').textContent = '';
  document.getElementById('questionArea').style.display = 'none'; document.getElementById('resultScreen').classList.add('show');
  var pct = score / questions.length;
  document.getElementById('resultEmoji').textContent = pct===1?'\uD83C\uDFC6':pct>=0.75?'\uD83C\uDF89':pct>=0.5?'\uD83D\uDC4D':'\uD83D\uDCAA';
  document.getElementById('resultTitle').textContent = pct===1?'Perfect!':pct>=0.75?'Great job!':pct>=0.5?'Good effort!':'Keep going!';
  document.getElementById('resultScore').textContent = pct===1?'All 8 correct. Excellent!':score+' out of '+questions.length+' correct.'+(pct<0.75?' Keep practising!':'');
}

function restart() {
  current = 0; score = 0; answeredState = [];
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}
</script>
</body>
</html>
