<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg,#fce4ec 0%,#ede7f6 50%,#e8eaf6 100%); color: #4a3a6a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; text-align: center; color: #7c6fcd; }
.subtitle { color: #b0a8d8; font-size: 0.9rem; margin-bottom: 20px; text-align: center; font-weight: 600; }
.start-screen { display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
.start-emoji { font-size: 4rem; }
.start-title { font-size: 1.1rem; font-weight: 600; color: #7c6fcd; letter-spacing: 1px; }
.start-info { background: rgba(255,255,255,0.85); border-radius: 16px; border: 1px solid rgba(255,255,255,0.9); padding: 24px 28px; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(156,111,205,0.1); display: flex; flex-direction: column; gap: 14px; }
.start-info p { font-size: 0.95rem; color: #5a4a8a; font-weight: 600; }
.timer-input-row { display: flex; align-items: center; gap: 10px; }
.timer-input-row label { font-size: 0.95rem; color: #5a4a8a; font-weight: 600; white-space: nowrap; }
.timer-input { width: 70px; padding: 8px 12px; border-radius: 8px; border: 2px solid #d8d0f0; font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; color: #7c6fcd; text-align: center; outline: none; background: white; }
.timer-input:focus { border-color: #9c6fcd; }
.timer-unit { font-size: 0.95rem; color: #b0a8d8; font-weight: 600; }
.play-btn { padding: 18px 48px; border-radius: 14px; border: none; background: linear-gradient(135deg,#f48fb1,#9c6fcd); color: white; font-family: 'Quicksand', sans-serif; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; box-shadow: 0 4px 16px rgba(156,111,205,0.3); }
.play-btn:hover { opacity: 0.88; }
.portal-link-start { display: inline-block; margin-top: 4px; text-decoration: none; color: #9c6fcd; font-weight: 700; font-size: 0.95rem; padding: 10px 24px; border: 2px solid #9c6fcd; border-radius: 12px; transition: background 0.15s; }
.portal-link-start:hover { background: #f3f0fc; }
.question-number-display { font-size: 4rem; font-weight: 700; color: #9c6fcd; text-align: center; line-height: 1; margin-bottom: 4px; }
.question-number-label { font-size: 0.85rem; color: #b0a8d8; text-align: center; font-weight: 600; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
.card { background: rgba(255,255,255,0.78); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.9); padding: 28px 32px; max-width: 580px; width: 100%; box-shadow: 0 8px 32px rgba(124,111,205,0.1); }
.timer-wrap { background: #e8e4f5; border-radius: 99px; height: 10px; margin-bottom: 8px; overflow: hidden; }
.timer-fill { height: 100%; background: #9c6fcd; border-radius: 99px; transition: width 1s linear, background 1s linear; width: 100%; }
.timer-fill.warning { background: #ff9800; }
.timer-fill.danger { background: #e53935; }
.timer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.timer-seconds { font-size: 1rem; font-weight: 700; color: #9c6fcd; }
.timer-seconds.warning { color: #ff9800; }
.timer-seconds.danger { color: #e53935; }
.pause-btn { padding: 5px 14px; border-radius: 8px; border: 1.5px solid #d8d0f0; background: white; color: #7c6fcd; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'Quicksand', sans-serif; transition: background 0.15s; }
.pause-btn:hover { background: #f3f0fc; }
.pause-btn:disabled { opacity: 0.3; cursor: default; }
.score-display { font-size: 0.82rem; color: #b0a8d8; font-weight: 700; }
.direct-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #b0a8d8; margin-bottom: 4px; }
.direct-speech { font-size: 1rem; font-style: italic; color: #7c6fcd; background: rgba(156,111,205,0.08); border-left: 3px solid #9c6fcd; padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; }
.question-text { font-size: 1.15rem; font-weight: 600; line-height: 1.6; margin-bottom: 24px; color: #4a3a6a; }
.btn-group { display: flex; flex-direction: column; gap: 12px; }
.answer-btn { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1.5px solid #d8d0f0; background: rgba(255,255,255,0.8); font-family: 'Quicksand', sans-serif; font-size: 1.05rem; font-weight: 600; color: #4a3a6a; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 15px; transition: all 0.2s; }
.answer-btn:hover:not(:disabled) { background: rgba(237,231,246,0.9); border-color: #9c6fcd; }
.finger-num { background: #f3f0fc; color: #9c6fcd; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: 800; border: 1px solid #d8d0f0; flex-shrink: 0; }
.answer-btn.correct { background: #e8f5e9 !important; border-color: #81c784 !important; color: #2e7d32 !important; }
.answer-btn.correct .finger-num { background: #81c784; color: white; border-color: #81c784; }
.answer-btn.wrong { background: #fce4ec !important; border-color: #f48fb1 !important; color: #c62828 !important; text-decoration: line-through; opacity: 0.7; }
.answer-btn.wrong .finger-num { background: #f48fb1; color: white; border-color: #f48fb1; }
.answer-btn:disabled { cursor: default; }
.feedback { margin-top: 16px; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; display: none; line-height: 1.5; }
.feedback.show { display: block; }
.feedback.correct-fb { background: #e8f5e9; color: #2e7d32; border: 1.5px solid #a5d6a7; }
.feedback.wrong-fb { background: #fce4ec; color: #c62828; border: 1.5px solid #f48fb1; }
.feedback.timeout-fb { background: #fff8e1; color: #e65100; border: 1.5px solid #ffcc80; }
.btn-row { display: flex; gap: 10px; margin-top: 18px; }
.back-btn { padding: 14px 18px; border-radius: 12px; border: 1.5px solid #d8d0f0; background: white; color: #7c6fcd; font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
.back-btn:hover { background: #f3f0fc; }
.next-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg,#f48fb1,#9c6fcd); color: white; font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
.next-btn:hover { opacity: 0.88; }
.result-screen { display: none; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
.result-screen.show { display: flex; }
.result-title { font-size: 1.6rem; font-weight: 700; color: #7c6fcd; }
.result-score { color: #b0a8d8; font-size: 1rem; }
.restart-btn { margin-top: 8px; padding: 12px 32px; border-radius: 12px; border: 1.5px solid #d8d0f0; background: white; font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 700; color: #7c6fcd; cursor: pointer; }
.restart-btn:hover { background: #f3f0fc; }
.portal-link { text-decoration: none; color: #9c6fcd; font-weight: 700; font-size: 0.95rem; padding: 10px 24px; border: 2px solid #9c6fcd; border-radius: 12px; transition: background 0.15s; }
.portal-link:hover { background: #f3f0fc; }
.eduki-shop-link { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: #9c6fcd; font-weight: 700; font-size: 0.88rem; padding: 9px 20px; border: 2px solid #9c6fcd; border-radius: 12px; background: white; transition: background 0.15s; }
.eduki-shop-link:hover { background: #f3f0fc; }
.eduki-divider { width: 80%; height: 1px; background: #d8d0f0; margin: 2px 0; }
@keyframes howl {
  0%   { transform: rotate(0deg) scale(1); }
  10%  { transform: rotate(-8deg) scale(1.05); }
  20%  { transform: rotate(8deg) scale(1.08); }
  30%  { transform: rotate(-6deg) scale(1.06); }
  40%  { transform: rotate(6deg) scale(1.1); }
  50%  { transform: rotate(-4deg) scale(1.08); }
  60%  { transform: rotate(4deg) scale(1.06); }
  70%  { transform: rotate(-2deg) scale(1.04); }
  80%  { transform: rotate(2deg) scale(1.02); }
  90%  { transform: rotate(-1deg) scale(1.01); }
  100% { transform: rotate(0deg) scale(1); }
}
@keyframes glow {
  0%, 100% { filter: drop-shadow(0 0 5px #9c6fcd); }
  50%       { filter: drop-shadow(0 0 16px #7c6fcd); }
}
.wolf-result-logo {
  width: 90px; height: auto; display: block; margin: 0 auto;
  border: none !important; border-radius: 0 !important; background: transparent !important;
  background-color: transparent !important; box-shadow: none !important;
}
.wolf-start-logo {
  width: 150px;
  border: none !important; border-radius: 0 !important; background: transparent !important;
  background-color: transparent !important; box-shadow: none !important;
}
.wolf-result-logo.animate {
  animation: howl 1.2s ease-in-out, glow 2s ease-in-out 1.2s infinite;
}
</style>
</head>
<body>

<h1>Indirect Speech</h1>
<p class="subtitle">Class 8 &middot; Requests, Commands, Advice &amp; Suggestions &middot; 8 Questions</p>

<div id="startScreen" class="start-screen">
  <img class="wolf-result-logo wolf-start-logo" src="wolf-logo.png" alt="Quizmaster Wolf">
  <div class="start-title">Quizmaster Wolf</div>
  <div class="start-info">
    <div class="timer-input-row">
      <label for="timerInput">&#9201; Seconds per question:</label>
      <input class="timer-input" id="timerInput" type="number" min="5" max="60" value="15">
      <span class="timer-unit">sec</span>
    </div>
  </div>
  <button class="play-btn" onclick="startQuiz()">&#9654; Let's go!</button>
  <a href="index.html" class="portal-link-start">&#8592; Back to Portal</a>
</div>

<div id="quizWrap" style="display:none; width:100%; max-width:580px;">
  <div class="question-number-display" id="bigNumber">1</div>
  <div class="question-number-label" id="bigLabel">of 8</div>
  <div class="card">
    <div class="timer-wrap"><div class="timer-fill" id="timerFill"></div></div>
    <div class="timer-row">
      <span class="timer-seconds" id="timerSeconds">15s</span>
      <button class="pause-btn" id="pauseBtn" onclick="togglePause()">Pause</button>
      <span class="score-display">Score: <strong id="scoreNum">0</strong></span>
    </div>
    <div id="questionArea">
      <div class="direct-label">Direct speech:</div>
      <div class="direct-speech" id="directSpeech"></div>
      <div class="question-text" id="questionText"></div>
      <div class="btn-group" id="btnGroup"></div>
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="back-btn" id="backBtn" onclick="goBack()">&#8592; Back</button>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next question &#8594;</button>
      </div>
    </div>
    <div class="result-screen" id="resultScreen">
      <img id="wolfLogo" class="wolf-result-logo" src="wolf-logo.png" alt="Quizmaster Wolf">
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <button class="restart-btn" onclick="restart()">&#8629; Play again</button>
      <a href="index.html" class="portal-link">&#8592; Back to Portal</a>
      <div class="eduki-divider"></div>
      <a href="https://eduki.com/de/autor/2801416/quizmaster-wolf" target="_blank" class="eduki-shop-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1h2l1.5 7.5h7L13 4H4" stroke="#9c6fcd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="13" r="1" fill="#9c6fcd"/><circle cx="11.5" cy="13" r="1" fill="#9c6fcd"/></svg>More quizzes on eduki.com</a>
    </div>
  </div>
</div>

<script>
var TIMER_SECONDS = 15;
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep() {
  try {
    var ctx = getAudioCtx(); var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

/* SWAP 2 */
var questions = [
  {
    direct: '"Stop talking during the test!"',
    text: 'The teacher _____ the students _____ during the test.',
    options: ['asked / to stop talking', 'advised / to stop talking', 'told / to stop talking', 'suggested / stopping talking', 'told / stop talking'],
    answer: 2,
    explanation: 'A firm command \u2192 tell sb. to do sth. \u2192 told the students to stop talking.'
  },
  {
    direct: '"You should drink more water."',
    text: 'The nurse _____ her _____ more water.',
    options: ['told / to drink', 'advised / to drink', 'suggested / drinking', 'asked / to drink', 'suggested / to drink'],
    answer: 1,
    explanation: '"Should" signals advice \u2192 advise sb. to do sth. \u2192 advised her to drink.'
  },
  {
    direct: '"Let\'s go for a walk in the park."',
    text: 'My friend _____ _____ for a walk in the park.',
    options: ['told us / to go', 'suggested / to go', 'suggested / going', 'advised / going', 'asked / going'],
    answer: 2,
    explanation: '"Let\'s \u2026" is a suggestion \u2192 suggest + gerund \u2192 suggested going. Never "suggested to go"!'
  },
  {
    direct: '"Can you turn down the music?"',
    text: 'The neighbour _____ them _____ down the music.',
    options: ['told / to turn', 'suggested / turning', 'advised / to turn', 'asked / to turn', 'asked / turning'],
    answer: 3,
    explanation: '"Can you \u2026?" is a polite request \u2192 ask sb. to do sth. \u2192 asked them to turn.'
  },
  {
    direct: '"Don\'t touch the wet paint!"',
    text: 'The painter _____ us _____ the wet paint.',
    options: ['suggested / not touching', 'asked / not to touch', 'advised / not to touch', 'told / not to touch', 'told / to not touch'],
    answer: 3,
    explanation: 'A warning/command \u2192 tell sb. not to do sth. \u2192 told us not to touch.'
  },
  {
    direct: '"Why don\'t you join the school choir?"',
    text: 'Mrs Peters _____ that I _____ the school choir.',
    options: ['told / join', 'asked / join', 'advised / join', 'suggested / joined', 'suggested / join'],
    answer: 4,
    explanation: '"suggest that + subject + base verb (subjunctive)" \u2192 suggested that I join.'
  },
  {
    direct: '"Please hand in your homework by Friday."',
    text: 'The teacher _____ us _____ our homework by Friday.',
    options: ['told / to hand in', 'advised / to hand in', 'asked / to hand in', 'suggested / handing in', 'asked / handing in'],
    answer: 2,
    explanation: '"Please \u2026" = polite request \u2192 ask sb. to do sth. \u2192 asked us to hand in.'
  },
  {
    direct: '"You should revise chapter 4 again."',
    text: 'Our coach _____ the team _____ chapter 4 again.',
    options: ['suggested / revising', 'told / to revise', 'asked / to revise', 'advised / to revise', 'suggested / to revise'],
    answer: 3,
    explanation: '"Should" = advice \u2192 advise sb. to do sth. \u2192 advised the team to revise.'
  }
];
/* END SWAP 2 */

var current = 0, score = 0, answered = false, paused = false;
var timerInterval = null, timeLeft = TIMER_SECONDS;
var answeredState = [];

function startQuiz() {
  var val = parseInt(document.getElementById('timerInput').value);
  if (isNaN(val) || val < 5) val = 5;
  if (val > 60) val = 60;
  TIMER_SECONDS = val;
  try { getAudioCtx(); } catch(e) {}
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  var q = questions[current];
  document.getElementById('bigNumber').textContent = current + 1;
  document.getElementById('bigLabel').textContent = 'of ' + questions.length;
  if (document.getElementById('directSpeech')) {
    document.getElementById('directSpeech').textContent = q.direct || '';
  }
  document.getElementById('questionText').textContent = q.text;
  var html = '';
  for (var i = 0; i < q.options.length; i++) {
    html += '<button class="answer-btn" id="btn' + i + '" onclick="answer(' + i + ')"><span class="finger-num">' + (i+1) + '</span>' + q.options[i] + '</button>';
  }
  document.getElementById('btnGroup').innerHTML = html;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').textContent = current + 1 < questions.length ? 'Next question \u2192' : 'See results \u2192';
  document.getElementById('backBtn').textContent = current === 0 ? '\u2190 Start' : '\u2190 Back';
  document.getElementById('pauseBtn').textContent = 'Pause';
  paused = false;

  if (answeredState[current] !== undefined) {
    answered = true; clearInterval(timerInterval);
    var state = answeredState[current];
    for (var i = 0; i < q.options.length; i++) { document.getElementById('btn' + i).disabled = true; }
    if (state.chosen !== null) {
      document.getElementById('btn' + state.chosen).classList.add(state.correct ? 'correct' : 'wrong');
      if (!state.correct) document.getElementById('btn' + q.answer).classList.add('correct');
      var fb = document.getElementById('feedback');
      fb.textContent = (state.correct ? '\u2705 Correct! ' : '\u274C Not quite! ') + q.explanation;
      fb.className = 'feedback show ' + (state.correct ? 'correct-fb' : 'wrong-fb');
    } else {
      document.getElementById('feedback').textContent = "\u23F0 Time's up! Next question please.";
      document.getElementById('feedback').className = 'feedback show timeout-fb';
    }
    document.getElementById('timerFill').style.width = '0%';
    document.getElementById('timerSeconds').textContent = '\u2013';
    document.getElementById('pauseBtn').disabled = true;
  } else {
    answered = false;
    document.getElementById('pauseBtn').disabled = false;
    startTimer();
  }
}

function goBack() {
  clearInterval(timerInterval);
  if (current === 0) {
    document.getElementById('quizWrap').style.display = 'none';
    document.getElementById('startScreen').style.display = 'flex';
    current = 0; score = 0; answeredState = [];
    document.getElementById('scoreNum').textContent = 0;
    document.getElementById('questionArea').style.display = 'block';
    document.getElementById('resultScreen').classList.remove('show');
  } else {
    current--; renderQuestion();
  }
}

function togglePause() {
  if (answered) return; paused = !paused;
  if (paused) { clearInterval(timerInterval); document.getElementById('pauseBtn').textContent = '\u25BA Resume'; }
  else { document.getElementById('pauseBtn').textContent = 'Pause'; timerInterval = setInterval(tick, 1000); }
}

function startTimer() {
  clearInterval(timerInterval); paused = false; timeLeft = TIMER_SECONDS;
  updateTimerDisplay(); timerInterval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--; updateTimerDisplay();
  if (timeLeft <= 3 && timeLeft > 0) { beep(); }
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    if (!answered) {
      answered = true; answeredState[current] = { chosen: null, correct: false };
      for (var i = 0; i < questions[current].options.length; i++) { document.getElementById('btn' + i).disabled = true; }
      document.getElementById('feedback').textContent = "\u23F0 Time's up! Next question please.";
      document.getElementById('feedback').className = 'feedback show timeout-fb';
      document.getElementById('pauseBtn').disabled = true;
    }
    setTimeout(function() { nextQuestion(); }, 2000);
  }
}

function updateTimerDisplay() {
  var pct = (timeLeft / TIMER_SECONDS) * 100;
  var fill = document.getElementById('timerFill'); var secs = document.getElementById('timerSeconds');
  var warn = Math.round(TIMER_SECONDS * 0.4); var danger = Math.round(TIMER_SECONDS * 0.2);
  fill.style.width = pct + '%';
  fill.className = 'timer-fill' + (timeLeft <= danger ? ' danger' : timeLeft <= warn ? ' warning' : '');
  secs.className = 'timer-seconds' + (timeLeft <= danger ? ' danger' : timeLeft <= warn ? ' warning' : '');
  secs.textContent = timeLeft + 's';
}

function answer(idx) {
  if (answered) return; answered = true; clearInterval(timerInterval);
  document.getElementById('pauseBtn').disabled = true;
  var q = questions[current]; var correct = idx === q.answer;
  answeredState[current] = { chosen: idx, correct: correct };
  for (var i = 0; i < q.options.length; i++) { document.getElementById('btn' + i).disabled = true; }
  document.getElementById('btn' + idx).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById('btn' + q.answer).classList.add('correct');
  if (correct) { score++; document.getElementById('scoreNum').textContent = score; }
  var fb = document.getElementById('feedback');
  fb.textContent = (correct ? '\u2705 Correct! ' : '\u274C Not quite! ') + q.explanation;
  fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
}

function nextQuestion() {
  clearInterval(timerInterval); current++;
  if (current >= questions.length) showResult(); else renderQuestion();
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('timerFill').style.width = '0%'; document.getElementById('timerSeconds').textContent = '';
  document.getElementById('bigNumber').textContent = ''; document.getElementById('bigLabel').textContent = '';
  document.getElementById('questionArea').style.display = 'none'; document.getElementById('resultScreen').classList.add('show');
  var wolf = document.getElementById('wolfLogo');
  wolf.classList.remove('animate');
  void wolf.offsetWidth;
  wolf.classList.add('animate');
  var pct = score / questions.length;
  document.getElementById('resultTitle').textContent = pct===1?'Perfect!':pct>=0.75?'Great job!':pct>=0.5?'Good effort!':'Keep going!';
  document.getElementById('resultScore').textContent = pct===1?'All 8 correct. Excellent!':score+' out of '+questions.length+' correct.'+(pct<0.75?' Keep practising!':'');
}

function restart() {
  current = 0; score = 0; answeredState = [];
  document.getElementById('scoreNum').textContent = 0;
  document.getElementById('questionArea').style.display = 'block';
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}
</script>
