<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wortanzeige – Klassenraum</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #f0b429;
    --accent2: #e05c2a;
    --text: #e6edf3;
    --muted: #7d8590;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* SETUP */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    gap: 1.4rem;
  }

  #setup h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--accent);
    text-align: center;
    line-height: 1.1;
  }

  #setup p {
    color: var(--muted);
    text-align: center;
    max-width: 460px;
    line-height: 1.6;
    font-size: .95rem;
  }

  textarea {
    width: 100%;
    max-width: 520px;
    min-height: 160px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    padding: 1rem 1.2rem;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
    line-height: 1.8;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .options {
    display: flex;
    gap: 1.4rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  label.toggle {
    display: flex;
    align-items: center;
    gap: .5rem;
    color: var(--muted);
    cursor: pointer;
    font-size: .92rem;
    user-select: none;
  }
  label.toggle input { accent-color: var(--accent); width: 16px; height: 16px; }

  .btn-primary {
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    padding: .85rem 2.6rem;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
  }
  .btn-primary:hover { transform: translateY(-2px); opacity: .9; }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: .4rem .9rem;
    font-family: 'DM Sans', sans-serif;
    font-size: .85rem;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  #error-msg {
    color: #f87171;
    font-size: .88rem;
    min-height: 1.2em;
    text-align: center;
  }

  /* DISPLAY */
  #display {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .85rem 1.6rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 1rem;
    flex-wrap: wrap;
  }

  .progress-label {
    font-size: .88rem;
    color: var(--muted);
    white-space: nowrap;
    min-width: 55px;
    text-align: right;
  }

  .progress-bar-wrap {
    flex: 1;
    min-width: 80px;
    max-width: 360px;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    cursor: pointer;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(240,180,41,.07) 0%, transparent 70%);
    pointer-events: none;
  }

  #word-number {
    display: inline;
  }

  #word-display {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.5rem, 16vw, 13rem);
    font-weight: 900;
    line-height: 1;
    text-align: center;
    letter-spacing: -0.02em;
    color: var(--accent);
    word-break: break-word;
    max-width: 95vw;
    transition: opacity .15s ease, transform .15s ease;
  }

  .review-badge {
    position: absolute;
    top: 1rem;
    right: 1.4rem;
    background: rgba(224, 92, 42, 0.15);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 6px;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .08em;
    padding: .25rem .65rem;
    text-transform: uppercase;
  }

  #word-display.out {
    opacity: 0;
    transform: scale(.92);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(.86); }
    to   { opacity: 1; transform: scale(1); }
  }
  .pop { animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both; }

  .hint {
    position: absolute;
    bottom: 1.4rem;
    color: var(--muted);
    font-size: .82rem;
    opacity: .5;
    pointer-events: none;
  }

  /* DONE */
  #done {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 1.4rem;
    padding: 2rem;
    text-align: center;
  }

  #done .emoji { font-size: 4rem; }

  #done h2 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--accent);
  }

  #done p { color: var(--muted); font-size: .95rem; }

  .done-btns {
    display: flex;
    flex-direction: column;
    gap: .75rem;
    margin-top: .5rem;
  }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>Wortanzeige</h1>
  <a href="https://claude.ai/project/019d96f3-ba7b-739a-b68e-da3603ccf66b" target="_blank" style="color:var(--muted);font-size:.82rem;text-decoration:none;opacity:.6;">↗ In Claude öffnen</a>
  <p>Wörter einfügen – eines pro Zeile oder kommagetrennt.</p>

  <textarea id="words-input" placeholder="Hund&#10;Katze&#10;Maus&#10;Schule&#10;..."></textarea>

  <div class="options">
    <label class="toggle">
      <input type="checkbox" id="opt-shuffle" checked>
      Zufällige Reihenfolge
    </label>
    <label class="toggle">
      <input type="checkbox" id="opt-number">
      Nummerierung
</label>
  </div>

  <div id="error-msg"></div>
  <button class="btn-primary" id="btn-start">Starten →</button>
</div>

<!-- DISPLAY -->
<div id="display">
  <div class="top-bar">
    <button class="btn-ghost" id="btn-back">← Neue Wörter</button>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 0</div>
  </div>

  <div class="stage" id="stage" title="Klicken oder Leertaste für nächstes Wort">
    <div id="review-badge" class="review-badge" style="display:none">Besprechung</div>
    <div id="word-display"><span id="word-number"></span><span id="word-text"></span></div>
    <div class="hint">Klicken oder Leertaste → nächstes Wort</div>
  </div>
</div>

<!-- DONE -->
<div id="done">
  <div class="emoji">🎉</div>
  <h2>Alle Wörter durch!</h2>
  <p id="done-count"></p>
  <div class="done-btns">
    <button class="btn-primary" id="btn-review">Besprechung starten →</button>
    <button class="btn-ghost" id="btn-restart-same">Nochmal (neue Reihenfolge)</button>
    <button class="btn-ghost" id="btn-restart-new">Neue Wörter eingeben</button>
  </div>
</div>

<script>
  const setupEl      = document.getElementById('setup');
  const displayEl    = document.getElementById('display');
  const doneEl       = document.getElementById('done');
  const inputEl      = document.getElementById('words-input');
  const errorEl      = document.getElementById('error-msg');
  const btnStart     = document.getElementById('btn-start');
  const btnBack      = document.getElementById('btn-back');
  const btnReview    = document.getElementById('btn-review');
  const btnRestartS  = document.getElementById('btn-restart-same');
  const btnRestartN  = document.getElementById('btn-restart-new');
  const wordEl       = document.getElementById('word-display');
  const numberEl     = document.getElementById('word-number');
  const wordTextEl   = document.getElementById('word-text');
  const reviewBadge  = document.getElementById('review-badge');
  const progressFill = document.getElementById('progress-fill');
  const progressLbl  = document.getElementById('progress-label');
  const stageEl      = document.getElementById('stage');
  const doneCount    = document.getElementById('done-count');
  const optShuffle   = document.getElementById('opt-shuffle');
  

  let words      = [];
  let origWords  = [];
  let index      = 0;
  let busy       = false;
  let isReview   = false;

  function parseWords(raw) {
    return raw.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function show(id) {
    setupEl.style.display   = 'none';
    displayEl.style.display = 'none';
    doneEl.style.display    = 'none';
    document.getElementById(id).style.display = 'flex';
  }

  function updateProgress() {
    const pct = words.length ? (index / words.length) * 100 : 0;
    progressFill.style.width = pct + '%';
    progressLbl.textContent  = index + ' / ' + words.length;
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function showWord(i) {
    if (busy) return;
    busy = true;

    wordEl.classList.add('out');
    await wait(160);

    if (i >= words.length) {
      show('done');
      if (isReview) {
        doneCount.textContent = 'Besprechung abgeschlossen.';
        btnReview.style.display = 'none';
      } else {
        doneCount.textContent = words.length + ' Wörter wurden angezeigt.';
        btnReview.style.display = '';
      }
      busy = false;
      return;
    }

    index = i;
    let w = words[index];
    numberEl.textContent = document.getElementById('opt-number').checked ? (index + 1) + '. ' : '';
    wordTextEl.textContent = w;

    wordEl.classList.remove('out', 'pop');
    void wordEl.offsetWidth;
    wordEl.classList.add('pop');

    updateProgress();
    busy = false;
  }

  function startSession(wordList, review = false) {
    isReview = review;
    if (!review) {
      origWords = [...wordList];
      words = [...wordList];
      if (optShuffle.checked) shuffle(words);
    } else {
      words = [...origWords]; // same shuffled order as first run
    }
    index = 0;
    reviewBadge.style.display = review ? '' : 'none';
    updateProgress();
    wordTextEl.textContent = '';
    numberEl.textContent = '';
    wordEl.classList.remove('out', 'pop');
    numberEl.classList.remove('out');
    show('display');
    showWord(0);
  }

  btnStart.addEventListener('click', () => {
    const parsed = parseWords(inputEl.value);
    if (parsed.length < 1) {
      errorEl.textContent = 'Bitte mindestens ein Wort eingeben.';
      return;
    }
    errorEl.textContent = '';
    startSession(parsed, false);
  });

  stageEl.addEventListener('click', () => showWord(index + 1));

  document.addEventListener('keydown', e => {
    if (displayEl.style.display === 'flex' && (e.key === ' ' || e.key === 'ArrowRight')) {
      e.preventDefault();
      showWord(index + 1);
    }
  });

  btnBack.addEventListener('click', () => show('setup'));
  btnReview.addEventListener('click', () => startSession(origWords, true));
  btnRestartS.addEventListener('click', () => startSession(origWords, false));
  btnRestartN.addEventListener('click', () => show('setup'));
</script>
</body>
</html>
